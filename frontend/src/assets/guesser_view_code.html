<!-- Simple JavaScript for micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const guessInput = document.querySelector('input');
            const sendButton = document.querySelector('button.bg-primary-container');

            // Simulate pressing the send button
            const handleSend = () => {
                if (guessInput.value.trim() !== '') {
                    console.log('Guess Sent:', guessInput.value);
                    guessInput.value = '';
                    // Simple visual feedback
                    guessInput.classList.add('bg-tertiary-container/20');
                    setTimeout(() => {
                        guessInput.classList.remove('bg-tertiary-container/20');
                    }, 500);
                }
            };

            sendButton.addEventListener('click', handleSend);
            guessInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSend();
            });

            // Random rotation for players in the list to match "Digital Playground" aesthetic
            const playerItems = document.querySelectorAll('aside:first-of-type > div > div');
            playerItems.forEach(item => {
                const randomRot = (Math.random() * 2 - 1).toFixed(1);
                item.style.transform = `rotate(${randomRot}deg)`;
            });
        });
    </script>
